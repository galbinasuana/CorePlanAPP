<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reporting Summary</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}" media="screen">
    <link rel="stylesheet" href="{{ url_for('static', filename='print.css') }}" media="print">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Reporting Summary – {{ date }}</h1>
        <div class="screen-only">
            <button class="btn-export" onclick="window.print()">Export to PDF</button>
        </div>
    </div>

    <div class="summary-content">
        {{ summary_html|safe }}
    </div>

    <form action="/results" method="POST">
        <input type="hidden" name="question" value="{{ question }}">
        <button class="back-btn">⬅ Back to Main Dashboard</button>
    </form>

</div>

</body>
</html>
